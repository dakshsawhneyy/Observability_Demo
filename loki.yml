“Your API latency increased. Prometheus shows spike.
But WHY did it happen?”

Metrics tell what happened
But not why

“That’s where logs come in.”

# Observability Recap
Observability is the ability to understand what’s happening inside a system by looking at its outputs.

Metrics → trends
Logs → detailed events
Traces → request journey

#########################
What are Logs

Logs are event records generated by applications or systems.

Examples:
- error logs
- request logs
- system logs

Problem with Traditional Logging - ELK

- High storage cost
- Full-text indexing (expensive)
- Hard to scale
- Complex setup

“In traditional systems, everything is indexed — even what you don’t query.”

when a log line arrives, the engine breaks it down into individual words (tokens) and adds an entry for every single word into a massive "inverted index"

##########################
What is Loki

Loki is a log aggregation system designed to be cost-efficient by indexing only metadata, not full logs
log aggregation - the process of collecting and centralizing log data from disparate sources—such as servers, applications, and network devices—into a single repository for analysis

Loki indexes:
labels (metadata)

Loki does NOT index:
log content

Instead of reading every single page to find what you need, you look at the tag on the outside.

“Loki is like Prometheus for logs.”
Prometheus → metrics
Loki → logs
Both use labels

#########################
Loki Architecture

Application logs → Promtail → Loki → Grafana

Promtail:
- agent
- collects logs
- adds labels
- sends to Loki

Loki:
- stores logs
- indexes labels only
- uses chunks

Grafana:
- query logs
- visualize

###########################
Streams
“A stream is a set of logs sharing the same labels.”

Example:
- app=frontend
- env=prod

{app="mysql", env="prod"} and {app="mysql", env="dev"} are two different streams

Labels:
- labels = metadata
- used for querying

######################
Querying Logs

LogQL = like PromQL but for logs

