Imagine your application has 20 microservices. 
A user clicks ‘Pay Now’… and payment fails after 8 seconds. Where do you even start debugging?

“Logs?”
“Metrics?”
“Which service?”
“What if multiple services are involved?”

This is where Traces comes in 

- Logs tell events
- Metrics tell trends
- Traces tell journeys

“Distributed tracing answers one important question:
WHAT happened to this request across the entire system?”

- In distributed systems, requests travel across multiple services.
###################################

# How Distributed Systems Looks Like 

Client
  ↓
API Gateway
  ↓
Auth Service
  ↓
Payment Service
  ↓
Inventory Service
  ↓
Database

- One user request now travels across multiple services

Then explain issues:
- latency
- retries
- failures
- timeouts
- dependency chains

Example: 
Payment service looks healthy individually.
But when called from API Gateway, latency becomes 5 seconds.

Why Logs Fail here:
- In monoliths, logs worked well because everything was in one place.
- In distributed systems, logs are spread across multiple services

Tracing Helps in solving this
###################################

Components of Tracing

Trace:
- complete lifecycle of a request.
- User Request = One Trace

Span:
- one unit of work.
--- API call
--- DB query
--- authentication
--- cache lookup


Example: User clicks PAY NOW
1. API Gateway receives request
2. Auth Service validates token
3. Payment Service processes transaction
4. Inventory Service reserves item
5. DB updates order

--- each becomes a span
--- together become a trace

Trace ID:
- Every request gets a unique Trace ID

Now that we understand tracing… how do we implement it consistently across systems?
- OpenTelemetry

Now Since: - In distributed systems, logs are spread across multiple services
How do we connect these logs to ONE user request?

With Help of Trace ID

##############################
Problem OpenTelemtry Solving:

- vendor lock-in problem
- every vendor had own SDK
- migration pain

Example: 
- you have 100's of microservices
- Write in promclient but unable to migrate -- so effort

Opentelemtry - standard:
- Defining APIs, Exporters and SDKs
- Easily migrate to another stack

All Companies have agreed to accept this standard

OpenTelemetry unified observability standards.
##############################

Flow: 

Microservice(developers)
  ↓
Write Otel Api's/SDKs (Logs, Metrics, Traces)
  ↓
OTel Reciever/Collector (Limit - Excess Logs)
  ↓
Otel Processor
  ↓
Otel Exporter (Export Config File)
  ↓
Backend

# Now backend is flexible
Can attach anything to backend - Prometheus, Jaeger

# Example: Prometheus
Prometheus Architecture:
- Retriver -> TSDB -> HTTP Server -> Queries


Question: Why Collector?
Without collector, every microservice directly talks to backend.

Problem:
- configuration duplication
- scalability issues
- vendor coupling


###########################

Question: Can we trace EVERY request in production?
NO Right ?

Why?:
- cost
- storage
- performance

Sampling Comes in for this
- selecting a subset of application requests to record and store
- rather than capturing every single one

