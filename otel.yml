Imagine your application has 20 microservices. 
A user clicks ‘Pay Now’… and payment fails after 8 seconds. Where do you even start debugging?

“Logs?”
“Metrics?”
“Which service?”
“What if multiple services are involved?”

This is where Traces comes in 

- Logs tell events
- Metrics tell trends
- Traces tell journeys

“Distributed tracing answers one important question:
WHAT happened to this request across the entire system?”

- In distributed systems, requests travel across multiple services.
###################################

# How Distributed Systems Looks Like 

Client
  ↓
API Gateway
  ↓
Auth Service
  ↓
Payment Service
  ↓
Inventory Service
  ↓
Database

- One user request now travels across multiple services

Then explain issues:
- latency
- retries
- failures
- timeouts
- dependency chains

Example: 
Payment service looks healthy individually.
But when called from API Gateway, latency becomes 5 seconds.

Tracing Helps in solving this
###################################

Components of Tracing

Trace:
- complete lifecycle of a request.
- User Request = One Trace

Span:
- one unit of work.
--- API call
--- DB query
--- authentication
--- cache lookup

Trace ID:
- Every request gets a unique Trace ID

Now that we understand tracing… how do we implement it consistently across systems?
- OpenTelemetry

##############################
Problem OpenTelemtry Solving:
- you have 100's of microservices
- Write in promclient but unable to migrate -- so effort

Opentelemtry - standard:
- Defining APIs, Exporters and SDKs
- Easily migrate to another stack

All Companies have agreed to accept this standard

